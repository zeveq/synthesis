function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
    const s = document.createElement("script");
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function safeParseJSON(raw) {
  if (!raw || typeof raw !== "string") throw new Error("空のレスポンス");

  // Step1: マークダウンコードブロックを除去
  let s = raw
    .replace(/^```json\s*/m, "").replace(/^```\s*/m, "").replace(/```\s*$/m, "")
    .trim();

  // Step2: 最初の { から対応する最後の } を抽出
  const start = s.indexOf("{");
  if (start === -1) throw new Error("JSONが見つかりません: " + s.slice(0, 80));
  // 対応する } を括弧カウントで探す
  let depth = 0, end = -1;
  for (let i = start; i < s.length; i++) {
    if (s[i] === "{") depth++;
    else if (s[i] === "}") { depth--; if (depth === 0) { end = i; break; } }
  }
  s = end !== -1 ? s.slice(start, end + 1) : s.slice(start);

  // Step3: そのままパース
  try { return JSON.parse(s); } catch(e1) {
    // Step4: 文字列内外すべての生の制御文字を安全に置換
    // JSON文字列リテラルの中: \n \t に変換、外: スペースに変換
    let cleaned = "";
    let inStr = false, esc = false;
    for (let i = 0; i < s.length; i++) {
      const c = s[i];
      if (esc) { cleaned += c; esc = false; continue; }
      if (c === "\\" && inStr) { cleaned += c; esc = true; continue; }
      if (c === '"') { inStr = !inStr; cleaned += c; continue; }
      if (c === "\n") { cleaned += inStr ? "\\n" : " "; continue; }
      if (c === "\r") { cleaned += inStr ? "\\r" : " "; continue; }
      if (c === "\t") { cleaned += inStr ? "\\t" : " "; continue; }
      cleaned += c;
    }
    try { return JSON.parse(cleaned); } catch(e2) {
      // Step5: 末尾の不完全なJSON補完（未閉じ文字列→不完全プロパティ除去→括弧補完）
      let fixed = cleaned.replace(/,\s*$/,"");
      // 未閉じ文字列をステート機械で検出して閉じる
      let inS=false,es=false;
      for(let i=0;i<fixed.length;i++){const c=fixed[i];if(es){es=false;continue;}if(c==='\\'&&inS){es=true;continue;}if(c==='"'){inS=!inS;}}
      if(inS) fixed+='"';
      // 末尾の不完全プロパティ（"key": で終わっているもの）を除去
      fixed = fixed.replace(/,?\s*"[^"]*"\s*:\s*$/,"");
      fixed = fixed.replace(/,\s*([\]}])/g,"$1");
      const ob=(fixed.match(/\{/g)||[]).length-(fixed.match(/\}/g)||[]).length;
      const ab=(fixed.match(/\[/g)||[]).length-(fixed.match(/\]/g)||[]).length;
      for(let i=0;i<ab;i++) fixed+="]";
      for(let i=0;i<ob;i++) fixed+="}";
      fixed=fixed.replace(/,\s*([\]}])/g,"$1");
      try { return JSON.parse(fixed); } catch(e3) {
        throw new Error("JSONパース失敗: " + e3.message + " / 先頭: " + s.slice(0,60));
      }
    }
  }
}

async function callClaude(system, user, maxTokens) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": window.__SYNTHESIS_KEY__ || "", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, system: system, messages: [{ role: "user", content: user }] }),
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || "API error " + res.status); }
  const d = await res.json();
  return d.content.map((b) => b.text || "").join("");
}

async function callClaudeVision(system, text, images, maxTokens) {
  const content = [];
  images.forEach(img => {
    const b64       = typeof img === "string" ? img : img.b64;
    const mediaType = typeof img === "string" ? "image/jpeg" : (img.mediaType || "image/jpeg");
    content.push({ type: "image", source: { type: "base64", media_type: mediaType, data: b64 } });
  });
  if (text) content.push({ type: "text", text: text });
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": window.__SYNTHESIS_KEY__ || "", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, system: system, messages: [{ role: "user", content: content }] }),
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || "API error " + res.status); }
  const d = await res.json();
  return d.content.map((b) => b.text || "").join("");
}

// ── ファイル処理ユーティリティ ────────────────────────────────────
async function extractFromFile(file) {
  const ext = file.name.split(".").pop().toLowerCase();
  const result = { text: "", images: [] };

  if (["jpg","jpeg","png","gif","webp"].includes(ext)) {
    const b64 = await fileToBase64(file);
    const mediaTypeMap = { jpg:"image/jpeg", jpeg:"image/jpeg", png:"image/png", gif:"image/gif", webp:"image/webp" };
    const mediaType = mediaTypeMap[ext] || "image/jpeg";
    result.images.push({ name: file.name, b64: b64.split(",")[1], url: b64, mediaType });
    return result;
  }

  if (ext === "pdf") {
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    const pdfjsLib = window["pdfjs-dist/build/pdf"];
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    const texts = [];
    // テキスト抽出：全ページ（最大20ページ）
    for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      texts.push(tc.items.map(it => it.str).join(" "));
    }
    result.text = texts.join("\n\n");
    // 画像化：最初の3ページのみ（メモリ節約）
    for (let i = 1; i <= Math.min(pdf.numPages, 3); i++) {
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: 1.0 });
      const canvas = document.createElement("canvas");
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
      const dataUrl = canvas.toDataURL("image/jpeg", 0.65);
      result.images.push({ name: "PDF_p" + i + ".jpg", b64: dataUrl.split(",")[1], url: dataUrl });
      // canvasを明示的に解放
      canvas.width = 0; canvas.height = 0;
    }
    return result;
  }

  if (["xlsx","xls","csv"].includes(ext)) {
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
    const XLSX = window.XLSX;
    const ab = await file.arrayBuffer();
    const wb = XLSX.read(ab, { type: "array" });
    const rows = [];
    wb.SheetNames.forEach(name => {
      const ws = wb.Sheets[name];
      const csv = XLSX.utils.sheet_to_csv(ws, { blankrows: false });
      rows.push("【シート: " + name + "】\n" + csv);
    });
    result.text = rows.join("\n\n");
    return result;
  }

  if (ext === "pptx") {
    // PPTXはZIPなのでテキストのみ抽出
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js");
    const JSZip = window.JSZip;
    const ab = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);
    const texts = [];
    const slideFiles = Object.keys(zip.files).filter(n => n.match(/ppt\/slides\/slide\d+\.xml$/)).sort();
    for (const sf of slideFiles.slice(0, 15)) {
      const xml = await zip.files[sf].async("string");
      const stripped = xml.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
      if (stripped.length > 10) texts.push(stripped);
    }
    result.text = texts.join("\n\n");
    return result;
  }

  if (["txt","md"].includes(ext)) {
    result.text = await file.text();
    return result;
  }

  throw new Error("未対応のファイル形式: " + ext);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function CausalChainSVG({ data }) {
  if (!data || !data.nodes || !data.edges) return null;
  const nodes = data.nodes;
  const edges = data.edges;

  // トポロジカル層計算 (Kahn's BFS)
  const children = {}, inDeg = {};
  nodes.forEach(n => { children[n.id] = []; inDeg[n.id] = 0; });
  edges.forEach(e => {
    if (children[e.from]) children[e.from].push(e.to);
    inDeg[e.to] = (inDeg[e.to] || 0) + 1;
  });
  const layer = {};
  const queue = nodes.filter(n => !inDeg[n.id]).map(n => n.id);
  queue.forEach(id => { layer[id] = 0; });
  const bfsQ = [...queue];
  while (bfsQ.length) {
    const cur = bfsQ.shift();
    (children[cur] || []).forEach(child => {
      layer[child] = Math.max(layer[child] || 0, (layer[cur] || 0) + 1);
      inDeg[child]--;
      if (inDeg[child] === 0) bfsQ.push(child);
    });
  }

  // レイヤーごとにノードをグループ化
  const maxLayer = Math.max(...Object.values(layer), 0);
  const byLayer = {};
  for (let l = 0; l <= maxLayer; l++) byLayer[l] = [];
  nodes.forEach(n => byLayer[layer[n.id] || 0].push(n));

  // サイズ定数
  const NW = 156, NH = 64, gapX = 52, gapY = 18;
  const colW = NW + gapX;
  const W = Math.max(860, (maxLayer + 1) * colW + 80);
  const maxPerLayer = Math.max(...Object.values(byLayer).map(a => a.length), 1);
  const H = 56 + maxPerLayer * (NH + gapY) + 28;

  // ノード座標
  const pos = {};
  for (let l = 0; l <= maxLayer; l++) {
    const ln = byLayer[l];
    const totalH = ln.length * NH + (ln.length - 1) * gapY;
    const startY = (H - 56 - totalH) / 2 + 56;
    ln.forEach((n, i) => {
      pos[n.id] = { x: 40 + l * colW, y: startY + i * (NH + gapY) };
    });
  }

  const typeStyle = {
    action:  { bg: "#1a2f5a", badge: "施策", accent: "#c9920a" },
    effect:  { bg: "#1a5c3a", badge: "効果", accent: "#27ae60" },
    resolve: { bg: "#7a3520", badge: "解決", accent: "#c0392b" },
    goal:    { bg: "#4a1a6a", badge: "目標", accent: "#8e44ad" },
  };

  // エッジパス (ベジェ)
  const paths = edges.map(e => {
    const f = pos[e.from], t = pos[e.to];
    if (!f || !t) return null;
    const fx = f.x + NW, fy = f.y + NH / 2;
    const tx = t.x,      ty = t.y + NH / 2;
    const mx = (fx + tx) / 2;
    return { key: e.from + e.to, d: `M ${fx} ${fy} C ${mx} ${fy} ${mx} ${ty} ${tx} ${ty}` };
  }).filter(Boolean);

  return (
    <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", background: "#f8f7f4", borderRadius: 4 }}>
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
          <polygon points="0 0,7 2.5,0 5" fill="#aaa"/>
        </marker>
      </defs>

      {/* タイトル */}
      <text x={W/2} y={18} textAnchor="middle" fill="#1a2f5a" fontSize="13" fontWeight="900" fontFamily="sans-serif">{data.title}</text>
      <text x={W/2} y={32} textAnchor="middle" fill="#bbb" fontSize="8" fontFamily="monospace" letterSpacing="2">CAUSAL DAG — 因果構造グラフ</text>

      {/* レイヤーラベル */}
      {Array.from({ length: maxLayer + 1 }, (_, l) => {
        const labels = ["起　点", "第1波及", "第2波及", "第3波及", "到　達"];
        return (
          <text key={l} x={40 + l * colW + NW / 2} y={48}
            textAnchor="middle" fill="#ccc" fontSize="8" fontFamily="monospace">
            {labels[l] || ("L" + l)}
          </text>
        );
      })}

      {/* エッジ */}
      {paths.map(p => (
        <path key={p.key} d={p.d} fill="none" stroke="#c8c0b4" strokeWidth="1.5" markerEnd="url(#arr)"/>
      ))}

      {/* ノード */}
      {nodes.map(n => {
        const p = pos[n.id];
        if (!p) return null;
        const st = typeStyle[n.type] || typeStyle.effect;
        const lines = [];
        const lbl = n.label || "";
        for (let i = 0; i < lbl.length; i += 10) lines.push(lbl.slice(i, i + 10));
        return (
          <g key={n.id}>
            <rect x={p.x} y={p.y} width={NW} height={NH} rx="7"
              fill={st.bg} stroke={st.accent} strokeWidth="1.5"/>
            {/* バッジ */}
            <rect x={p.x + 5} y={p.y - 9} width={30} height={17} rx="8" fill={st.accent}/>
            <text x={p.x + 20} y={p.y + 0} textAnchor="middle" dominantBaseline="middle"
              fill="white" fontSize="8" fontWeight="bold" fontFamily="monospace">{st.badge}</text>
            {/* ラベル */}
            {lines.map((ln, li) => (
              <text key={li} x={p.x + NW / 2} y={p.y + 20 + li * 14} textAnchor="middle"
                fill="white" fontSize="11" fontWeight="bold" fontFamily="sans-serif">{ln}</text>
            ))}
            {/* detail */}
            {n.detail && (
              <text x={p.x + NW / 2} y={p.y + NH - 9} textAnchor="middle"
                fill="rgba(255,255,255,0.55)" fontSize="8" fontFamily="sans-serif">
                {n.detail.length > 17 ? n.detail.slice(0, 17) + "…" : n.detail}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

function ProblemTreeSVG({ data }) {
  if (!data) return null;
  const W = 920, catCount = (data.categories || []).length;
  // 各カテゴリの原因数から高さを動的計算
  const maxCauses = Math.max(...(data.categories||[]).map(c=>(c.causes||[]).length), 2);
  const causeH = 36, causeGap = 8, catPad = 24;
  const catH = catPad + maxCauses * (causeH + causeGap);
  const H = 120 + catH + 80 + 60; // root + cats + issues + footer

  const rootY = 48, rootH = 52, rootCX = W/2;
  const catY  = rootY + rootH + 60;
  const catW  = 240;
  const totalCatW = catCount * catW + (catCount-1) * 24;
  const catStartX = (W - totalCatW) / 2;
  const issueY = catY + catH + 56;
  const issueW = 220, issueH = 44;

  return (
    <svg viewBox={"0 0 " + W + " " + H} style={{ width:"100%", background:"#fafaf8", borderRadius:4 }}>
      <defs>
        <radialGradient id="rootGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#1a2f5a"/>
          <stop offset="100%" stopColor="#0d1f3c"/>
        </radialGradient>
        <filter id="shadow">
          <feDropShadow dx="0" dy="2" stdDeviation="3" floodOpacity="0.12"/>
        </filter>
      </defs>

      {/* タイトル */}
      <text x={W/2} y={18} textAnchor="middle" fill="#1a2f5a" fontSize="13" fontWeight="900" fontFamily="sans-serif">問題・課題ツリー図</text>

      {/* ── 根本問題ノード ── */}
      <rect x={rootCX-160} y={rootY} width={320} height={rootH} rx="8" fill="url(#rootGrad)" filter="url(#shadow)"/>
      <text x={rootCX} y={rootY+14} textAnchor="middle" fill="rgba(255,255,255,0.55)" fontSize="9" fontFamily="monospace" letterSpacing="3">ROOT PROBLEM</text>
      <text x={rootCX} y={rootY+34} textAnchor="middle" fill="white" fontSize="13" fontWeight="bold" fontFamily="sans-serif">{data.root}</text>

      {/* 根本問題→各カテゴリへの線 */}
      {(data.categories||[]).map((cat, ci) => {
        const cx = catStartX + ci * (catW + 24) + catW/2;
        return (
          <g key={ci}>
            <line x1={rootCX} y1={rootY+rootH} x2={cx} y2={catY} stroke="#c0c8d8" strokeWidth="1.5" strokeDasharray="5,3"/>
            <circle cx={cx} cy={catY} r="4" fill={cat.color || "#1a2f5a"}/>
          </g>
        );
      })}

      {/* ── カテゴリ＋原因ノード ── */}
      {(data.categories||[]).map((cat, ci) => {
        const cx = catStartX + ci * (catW + 24);
        const color = cat.color || "#1a2f5a";
        return (
          <g key={ci}>
            {/* カテゴリヘッダー */}
            <rect x={cx} y={catY} width={catW} height={36} rx="6" fill={color}/>
            <text x={cx+catW/2} y={catY+18} textAnchor="middle" dominantBaseline="middle"
              fill="white" fontSize="11" fontWeight="bold" fontFamily="sans-serif">{cat.label}</text>
            {/* 原因ノード */}
            {(cat.causes||[]).map((cause, ki) => {
              const ky = catY + 36 + catPad/2 + ki*(causeH+causeGap);
              return (
                <g key={ki}>
                  {/* カテゴリ→原因の縦線 */}
                  <line x1={cx+catW/2} y1={catY+36+(ki===0?catPad/2-causeH/2:0)} x2={cx+catW/2} y2={ky}
                    stroke={color} strokeWidth="1" strokeDasharray="3,2" strokeOpacity="0.4"/>
                  <rect x={cx+8} y={ky} width={catW-16} height={causeH} rx="5"
                    fill={color} fillOpacity="0.08" stroke={color} strokeWidth="1.2" strokeOpacity="0.35"/>
                  <rect x={cx+8} y={ky} width="3" height={causeH} rx="2" fill={color} fillOpacity="0.5"/>
                  {cause.length > 13 ? (
                    <g>
                      <text x={cx+18} y={ky+12} fill="#1f2937" fontSize="9" fontFamily="sans-serif">{cause.slice(0,13)}</text>
                      <text x={cx+18} y={ky+24} fill="#1f2937" fontSize="9" fontFamily="sans-serif">{cause.slice(13)}</text>
                    </g>
                  ) : (
                    <text x={cx+18} y={ky+causeH/2} dominantBaseline="middle" fill="#1f2937" fontSize="9" fontFamily="sans-serif">{cause}</text>
                  )}
                </g>
              );
            })}
          </g>
        );
      })}

      {/* カテゴリ→本質的課題への収束線 */}
      {(data.categories||[]).map((cat, ci) => {
        const cx = catStartX + ci*(catW+24) + catW/2;
        const issueCount = (data.issues||[]).length;
        const issueTotalW = issueCount*issueW + (issueCount-1)*20;
        const issueStartX = (W - issueTotalW)/2;
        // 最も近い課題ノードへ
        const targetX = issueStartX + Math.floor(ci * issueCount / (data.categories||[]).length) * (issueW+20) + issueW/2;
        return (
          <line key={ci} x1={cx} y1={catY+catH} x2={targetX} y2={issueY}
            stroke="#aaa" strokeWidth="1.5" strokeDasharray="4,3"/>
        );
      })}

      {/* ── 本質的課題ノード ── */}
      {(data.issues||[]).map((issue, ii) => {
        const issueCount = data.issues.length;
        const issueTotalW = issueCount*issueW + (issueCount-1)*20;
        const issueStartX = (W - issueTotalW)/2;
        const ix = issueStartX + ii*(issueW+20);
        return (
          <g key={ii}>
            <rect x={ix} y={issueY} width={issueW} height={issueH} rx="6"
              fill="#c0392b" fillOpacity="0.08" stroke="#c0392b" strokeWidth="1.8"/>
            <text x={ix+issueW/2} y={issueY+10} textAnchor="middle" fill="#c0392b" fontSize="8" fontFamily="monospace" fontWeight="bold">本質的課題 {ii+1}</text>
            {issue.length > 14 ? (
              <g>
                <text x={ix+issueW/2} y={issueY+24} textAnchor="middle" fill="#1f2937" fontSize="10" fontFamily="sans-serif">{issue.slice(0,14)}</text>
                <text x={ix+issueW/2} y={issueY+36} textAnchor="middle" fill="#1f2937" fontSize="10" fontFamily="sans-serif">{issue.slice(14)}</text>
              </g>
            ) : (
              <text x={ix+issueW/2} y={issueY+issueH/2+4} textAnchor="middle" dominantBaseline="middle" fill="#1f2937" fontSize="10" fontFamily="sans-serif">{issue}</text>
            )}
          </g>
        );
      })}

      <text x={W/2} y={H-8} textAnchor="middle" fill="#bbb" fontSize="8" fontFamily="monospace">PROBLEM TREE</text>
    </svg>
  );
}

  const [loading, setLoading]   = useState(false);
  const [files, setFiles]       = useState([]);
  const [status, setStatus]     = useState("");
  const inputRef = useRef(null);

  const processFile = async (file) => {
    setLoading(true);
    setStatus("📂 " + file.name + " を解析中...");
    try {
      const extracted = await extractFromFile(file);
      setStatus("🤖 Claudeが内容を言語化中...");
      const analysis = await analyzeFileWithClaude(extracted.text, extracted.images);
      setFiles(prev => [...prev, { name: file.name, analysis, images: extracted.images }]);
      allImages.current = [...(allImages.current || []), ...extracted.images];
      onAnalyzed(analysis);
      setStatus("✓ 解析完了: " + file.name);
    } catch (e) {
      setStatus("⚠ エラー: " + e.message);
    }
    setLoading(false);
  };

  const onDrop = (e) => {
    e.preventDefault(); setDragging(false);
    Array.from(e.dataTransfer.files).forEach(processFile);
  };

  return (
    <div style={{ marginTop: 10 }}>
      <div style={{ fontSize: 9, fontFamily: "monospace", letterSpacing: "0.25em", color: "#bbb", marginBottom: 4 }}>
        📎 資料をドロップ（PDF / Excel / PPTX / 画像）
      </div>
      <div
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={onDrop}
        onClick={() => inputRef.current.click()}
        style={{
          border: "2px dashed " + (dragging ? "#c9920a" : "#d0c8b8"),
          borderRadius: 4, padding: "10px 12px", cursor: "pointer", transition: "all 0.2s",
          background: dragging ? "rgba(201,146,10,0.06)" : "rgba(0,0,0,0.02)",
          textAlign: "center", fontSize: 11, color: "#aaa",
        }}
      >
        {loading ? status : (files.length === 0 ? "ここにファイルをドロップ、またはクリックして選択" : "＋ 追加する")}
        <input ref={inputRef} type="file" multiple accept=".pdf,.xlsx,.xls,.csv,.pptx,.jpg,.jpeg,.png,.webp,.txt"
          style={{ display: "none" }} onChange={(e) => Array.from(e.target.files).forEach(processFile)} />
      </div>
      {status && !loading && (
        <div style={{ fontSize: 10, color: status.startsWith("⚠") ? "#c0392b" : "#1a5c3a", marginTop: 4, fontFamily: "monospace" }}>{status}</div>
      )}
      {files.map((f, i) => (
        <div key={i} style={{ marginTop: 6, background: "#f0fff4", border: "1px solid #c3e6cb", borderRadius: 3, padding: "6px 10px" }}>
          <div style={{ fontFamily: "monospace", fontSize: 9, color: "#1a5c3a", fontWeight: 700, marginBottom: 2 }}>✓ {f.name}</div>
          <div style={{ fontSize: 10, color: "#555", lineHeight: 1.5 }}>{f.analysis.summary}</div>
          {f.images.length > 0 && (
            <div style={{ display: "flex", gap: 4, marginTop: 6, flexWrap: "wrap" }}>
              {f.images.slice(0, 4).map((img, j) => (
                <img key={j} src={img.url} alt="" style={{ width: 48, height: 32, objectFit: "cover", borderRadius: 2, border: "1px solid #ddd" }} />
              ))}
              {f.images.length > 4 && <span style={{ fontSize: 9, color: "#888", alignSelf: "center" }}>+{f.images.length-4}枚</span>}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── フローエディタ本体 ───────────────────────────────────────────
function ProcessFlowSVG({ nodes, edges, mode }) {
  if (!nodes || nodes.length === 0) return null;
  const NW = 124, NH = 38, GAP_X = 44, GAP_Y = 54;

  // トポロジカル層計算
  const ch={}, ind={};
  nodes.forEach(n=>{ ch[n.id]=[]; ind[n.id]=0; });
  (edges||[]).forEach(e=>{ if(ch[e.from]) ch[e.from].push(e.to); ind[e.to]=(ind[e.to]||0)+1; });
  const lay={};
  nodes.filter(n=>!ind[n.id]).forEach(n=>{ lay[n.id]=0; });
  const q=[...nodes.filter(n=>!ind[n.id]).map(n=>n.id)];
  while(q.length){ const c=q.shift(); (ch[c]||[]).forEach(x=>{ lay[x]=Math.max(lay[x]||0,(lay[c]||0)+1); ind[x]--; if(!ind[x])q.push(x); }); }
  const maxL=Math.max(...Object.values(lay),0);
  const byL={};
  for(let l=0;l<=maxL;l++) byL[l]=[];
  nodes.forEach(n=>byL[lay[n.id]||0].push(n));
  const maxP=Math.max(...Object.values(byL).map(a=>a.length),1);

  // ノード座標
  const NW_TOTAL=(maxL+1)*(NW+GAP_X)+40;
  const W=Math.max(560, NW_TOTAL);
  // tobe: 変更ノードの引き出し吹き出しエリアを下に確保
  const cNodes=mode==="tobe"?nodes.filter(n=>n.status!=="unchanged"):[];
  const BALLOON_H=54, BALLOON_W=148, BALLOON_GAP=10;
  const nodeRows=maxP;
  const nodeAreaH=16+nodeRows*(NH+GAP_Y);
  const H=nodeAreaH+(cNodes.length>0?BALLOON_H+40:8);

  const pos={};
  for(let l=0;l<=maxL;l++){
    const ln=byL[l]; const tH=ln.length*NH+(ln.length-1)*GAP_Y;
    const sy=12+(nodeAreaH-12-tH)/2;
    ln.forEach((n,i)=>{ pos[n.id]={x:20+l*(NW+GAP_X), y:sy+i*(NH+GAP_Y)}; });
  }

  // 吹き出し座標: 画面幅を均等分割
  const bBaseY=nodeAreaH+16;
  const totalBW=cNodes.length*(BALLOON_W)+(cNodes.length-1)*BALLOON_GAP;
  const bStartX=Math.max(20,(W-totalBW)/2);
  const bPos=cNodes.map((_,i)=>({ x:bStartX+i*(BALLOON_W+BALLOON_GAP), y:bBaseY }));

  const SS={
    unchanged:{ fill:"#1a2f5a", stroke:"#4a70a8", op:0.10, tf:"#1a2f5a" },
    changed:  { fill:"#c9920a", stroke:"#c9920a", op:0.16, tf:"#7a5200" },
    added:    { fill:"#1a5c3a", stroke:"#1a5c3a", op:0.16, tf:"#0d4028" },
  };
  const ep=e=>{ const f=pos[e.from],t=pos[e.to]; if(!f||!t) return null;
    const fx=f.x+NW,fy=f.y+NH/2,tx=t.x,ty=t.y+NH/2;
    if(Math.abs(fy-ty)<3) return `M ${fx} ${fy} L ${tx} ${ty}`;
    const mx=(fx+tx)/2; return `M ${fx} ${fy} C ${mx} ${fy} ${mx} ${ty} ${tx} ${ty}`; };

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",background:"#fafaf8",borderRadius:4,border:"1px solid #e8e4dc"}}>
      <defs>
        <marker id={"pm"+mode} markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
          <polygon points="0 0,7 2.5,0 5" fill="#ccc"/>
        </marker>
      </defs>

      {/* エッジ */}
      {(edges||[]).map((e,i)=>{ const d=ep(e); if(!d) return null;
        return <path key={i} d={d} fill="none" stroke="#ccc" strokeWidth="1.5" markerEnd={"url(#pm"+mode+")"}/>; })}

      {/* ノード */}
      {nodes.map(n=>{ const p=pos[n.id]; if(!p) return null;
        const st=SS[n.status||"unchanged"];
        return (
          <g key={n.id}>
            <rect x={p.x} y={p.y} width={NW} height={NH} rx="6"
              fill={st.fill} fillOpacity={st.op} stroke={st.stroke}
              strokeWidth={n.status!=="unchanged"?2:1.5}
              strokeDasharray={n.status==="added"?"6,3":"none"}/>
            {n.status!=="unchanged" && (
              <text x={p.x+5} y={p.y+8} fill={st.stroke} fontSize="7" fontFamily="monospace" fontWeight="bold">
                {n.status==="added"?"NEW":"改"}
              </text>
            )}
            <text x={p.x+NW/2} y={p.y+NH/2} textAnchor="middle" dominantBaseline="middle"
              fill={st.tf} fontSize="11" fontWeight="bold" fontFamily="sans-serif">
              {(n.label||"").length>10?n.label.slice(0,9)+"…":n.label}
            </text>
          </g>
        );
      })}

      {/* 引き出し線 + 吹き出しコメント */}
      {cNodes.map((n,ci)=>{
        const p=pos[n.id]; if(!p) return null;
        const st=SS[n.status||"unchanged"];
        const bp=bPos[ci];
        // 引き出し元: ノード下辺中央
        const lx0=p.x+NW/2, ly0=p.y+NH;
        // 吹き出し上辺中央
        const lx1=bp.x+BALLOON_W/2, ly1=bp.y;
        // ベジェ制御点
        const cy0=ly0+(ly1-ly0)*0.45;
        return (
          <g key={"b"+n.id}>
            {/* 引き出し線 */}
            <path d={`M ${lx0} ${ly0} C ${lx0} ${cy0} ${lx1} ${cy0} ${lx1} ${ly1}`}
              fill="none" stroke={st.stroke} strokeWidth="1.2" strokeDasharray="4,3" strokeOpacity="0.7"/>
            <circle cx={lx0} cy={ly0} r="2.5" fill={st.stroke} fillOpacity="0.5"/>
            {/* 吹き出し矩形 */}
            <rect x={bp.x} y={bp.y} width={BALLOON_W} height={BALLOON_H} rx="5"
              fill="white" stroke={st.stroke} strokeWidth="1.5" filter="none"/>
            {/* ヘッダバー */}
            <rect x={bp.x} y={bp.y} width={BALLOON_W} height={16} rx="5" fill={st.stroke} fillOpacity="0.15"/>
            <rect x={bp.x} y={bp.y+10} width={BALLOON_W} height={6} fill={st.stroke} fillOpacity="0.15"/>
            <text x={bp.x+6} y={bp.y+11} fill={st.stroke} fontSize="8" fontFamily="monospace" fontWeight="bold">
              {n.status==="added"?"＋ 追加":"✎ 変更"} — {(n.label||"").slice(0,10)}
            </text>
            {/* コメント本文 */}
            <text x={bp.x+6} y={bp.y+27} fill="#333" fontSize="9" fontFamily="sans-serif">
              {(n.comment||"").slice(0,22)}{(n.comment||"").length>22?"…":""}
            </text>
            {/* 理由 */}
            <text x={bp.x+6} y={bp.y+41} fill="#888" fontSize="8" fontFamily="sans-serif">
              {"理由: "+(n.reason||"").slice(0,20)}{(n.reason||"").length>20?"…":""}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function FlowEditor({ nodes, edges, onNodesChange, onEdgesChange }) {
  const svgRef = React.useRef(null);
  const NW = 126, NH = 38;

  // モード: "normal" | "conn_from" | "conn_to"
  const [mode,      setMode]      = React.useState("normal");
  const [connFrom,  setConnFrom]  = React.useState(null);
  const [dragging,  setDragging]  = React.useState(null); // {id, ox, oy}
  const [panning,   setPanning]   = React.useState(null);
  const [mousePos,  setMousePos]  = React.useState({ x:0, y:0 });
  const [editId,    setEditId]    = React.useState(null);
  const [editVal,   setEditVal]   = React.useState("");
  const [vb,        setVb]        = React.useState({ x:0, y:0, w:960, h:230 });

  const toSVG = (cx, cy) => {
    const r = svgRef.current.getBoundingClientRect();
    return {
      x: vb.x + (cx - r.left) * (vb.w / r.width),
      y: vb.y + (cy - r.top)  * (vb.h / r.height),
    };
  };

  // ── ノードクリック（接続モード用） ──────────────────────────────
  const handleNodeClick = (e, nodeId) => {
    e.stopPropagation();
    if (mode === "conn_from") {
      setConnFrom(nodeId);
      setMode("conn_to");
      return;
    }
    if (mode === "conn_to") {
      if (nodeId !== connFrom) {
        const exists = edges.some(ed => ed.from === connFrom && ed.to === nodeId);
        if (!exists) onEdgesChange([...edges, { id:"e"+Date.now(), from:connFrom, to:nodeId }]);
      }
      setConnFrom(null);
      setMode("conn_from"); // 連続で接続できるよう接続元選択に戻す
      return;
    }
  };

  // ── ノードMouseDown（ドラッグ用、通常モードのみ） ───────────────
  const handleNodeMouseDown = (e, nodeId) => {
    if (mode !== "normal") return;
    if (e.button !== 0) return;
    e.stopPropagation();
    const node = nodes.find(n => n.id === nodeId);
    const sv = toSVG(e.clientX, e.clientY);
    setDragging({ id: nodeId, ox: sv.x - node.x, oy: sv.y - node.y });
  };

  // ── SVGMouseDown（パン） ─────────────────────────────────────────
  const handleSVGMouseDown = (e) => {
    if (mode !== "normal") return;
    if (e.altKey || e.button === 1) {
      e.preventDefault();
      setPanning({ sx: e.clientX, sy: e.clientY, vx: vb.x, vy: vb.y });
    }
  };

  const handleMouseMove = (e) => {
    if (!svgRef.current) return;
    const sv = toSVG(e.clientX, e.clientY);
    setMousePos(sv);
    if (dragging) {
      onNodesChange(nodes.map(n =>
        n.id === dragging.id ? { ...n, x: sv.x - dragging.ox, y: sv.y - dragging.oy } : n
      ));
    }
    if (panning) {
      const r = svgRef.current.getBoundingClientRect();
      setVb(v => ({
        ...v,
        x: panning.vx - (e.clientX - panning.sx) * (v.w / r.width),
        y: panning.vy - (e.clientY - panning.sy) * (v.h / r.height),
      }));
    }
  };

  const handleMouseUp = () => { setDragging(null); setPanning(null); };

  const handleWheel = (e) => {
    e.preventDefault();
    const f  = e.deltaY > 0 ? 1.12 : 0.89;
    const sv = toSVG(e.clientX, e.clientY);
    setVb(v => {
      const nw = Math.min(2400, Math.max(360, v.w * f));
      const nh = nw * (v.h / v.w);
      return { x: sv.x-(sv.x-v.x)*(nw/v.w), y: sv.y-(sv.y-v.y)*(nh/v.h), w: nw, h: nh };
    });
  };

  const addNode = () => {
    const id = "n" + Date.now();
    onNodesChange([...nodes, { id, label:"新規工程", x: vb.x+vb.w/2-NW/2, y: vb.y+vb.h/2-NH/2 }]);
    setEditId(id); setEditVal("新規工程");
  };

  const removeNode = (id) => {
    onNodesChange(nodes.filter(n => n.id !== id));
    onEdgesChange(edges.filter(ed => ed.from !== id && ed.to !== id));
  };

  const commitEdit = () => {
    if (editId) {
      onNodesChange(nodes.map(n => n.id === editId ? { ...n, label: editVal } : n));
      setEditId(null);
    }
  };

  const edgePath = (ed) => {
    const f = nodes.find(n => n.id === ed.from);
    const t = nodes.find(n => n.id === ed.to);
    if (!f || !t) return null;
    const fx = f.x + NW, fy = f.y + NH/2;
    const tx = t.x,      ty = t.y + NH/2;
    if (Math.abs(fy - ty) < 3) return `M ${fx} ${fy} L ${tx} ${ty}`;
    const mx = (fx + tx) / 2;
    return `M ${fx} ${fy} C ${mx} ${fy} ${mx} ${ty} ${tx} ${ty}`;
  };

  const modeLabel = { normal:"", conn_from:"→ 接続元を選択", conn_to:"→ 接続先を選択" };
  const isConn = mode !== "normal";

  return (
    <div style={{ userSelect:"none" }}>
      {/* ツールバー */}
      <div style={{ display:"flex", gap:7, marginBottom:7, flexWrap:"wrap", alignItems:"center" }}>
        <button onClick={addNode}
          style={{ padding:"4px 11px", background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.25)", color:"white", fontFamily:"monospace", fontSize:11, cursor:"pointer", borderRadius:2 }}>
          ＋ 追加
        </button>
        <button
          onClick={() => {
            if (isConn) { setMode("normal"); setConnFrom(null); }
            else        { setMode("conn_from"); }
          }}
          style={{ padding:"4px 11px", background: isConn ? "#c9920a" : "rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.25)", color: isConn ? "#1a2f5a" : "white", fontFamily:"monospace", fontSize:11, cursor:"pointer", borderRadius:2, fontWeight: isConn ? "bold" : "normal", minWidth:140 }}>
          {isConn ? modeLabel[mode] : "→ 接続モード"}
        </button>
        {isConn && (
          <span style={{ color:"#c9920a", fontSize:10, fontFamily:"monospace" }}>
            {mode === "conn_from" ? "接続元ノードをクリック" : "接続先ノードをクリック"}
          </span>
        )}
        <button onClick={() => setVb({ x:0, y:0, w:960, h:230 })}
          style={{ padding:"4px 9px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.4)", fontFamily:"monospace", fontSize:10, cursor:"pointer", borderRadius:2 }}>
          ⟳ 表示リセット
        </button>
        <span style={{ fontSize:9, color:"rgba(255,255,255,0.25)", fontFamily:"monospace" }}>
          ドラッグ:移動　ダブルクリック:名前編集　Alt+ドラッグ:パン　ホイール:ズーム
        </span>
      </div>

      {/* キャンバス */}
      <svg ref={svgRef}
        viewBox={`${vb.x} ${vb.y} ${vb.w} ${vb.h}`}
        style={{ width:"100%", height:230, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:4, cursor: isConn ? "crosshair" : panning ? "grabbing" : "default", display:"block" }}
        onMouseMove={handleMouseMove}
        onMouseUp={handleMouseUp}
        onMouseLeave={handleMouseUp}
        onMouseDown={handleSVGMouseDown}
        onWheel={handleWheel}
      >
        <defs>
          <marker id="fe-a" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
            <polygon points="0 0,7 2.5,0 5" fill="#7a9cc8"/>
          </marker>
          <marker id="fe-ac" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
            <polygon points="0 0,7 2.5,0 5" fill="#c9920a"/>
          </marker>
          <pattern id="fe-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.035)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect x={vb.x} y={vb.y} width={vb.w} height={vb.h} fill="url(#fe-grid)"/>

        {/* 接続中のプレビュー線 */}
        {mode === "conn_to" && connFrom && (() => {
          const fn = nodes.find(n => n.id === connFrom);
          if (!fn) return null;
          return <line x1={fn.x+NW} y1={fn.y+NH/2} x2={mousePos.x} y2={mousePos.y}
            stroke="#c9920a" strokeWidth="1.5" strokeDasharray="5,3"/>;
        })()}

        {/* エッジ（クリックで削除） */}
        {edges.map(ed => {
          const d = edgePath(ed);
          if (!d) return null;
          return (
            <g key={ed.id} style={{ cursor:"pointer" }}
              onClick={e => { if (mode === "normal") { e.stopPropagation(); onEdgesChange(edges.filter(x => x.id !== ed.id)); } }}>
              <path d={d} fill="none" stroke="transparent" strokeWidth="12"/>
              <path d={d} fill="none" stroke="#7a9cc8" strokeWidth="1.5" markerEnd="url(#fe-a)" style={{ pointerEvents:"none" }}/>
            </g>
          );
        })}

        {/* ノード */}
        {nodes.map(node => {
          const isFrom = mode === "conn_to"   && connFrom === node.id;
          const isHint = mode === "conn_from";
          const isTo   = mode === "conn_to"   && connFrom !== node.id;
          return (
            <g key={node.id}
              style={{ cursor: isConn ? "pointer" : dragging?.id === node.id ? "grabbing" : "grab" }}
              onMouseDown={e => handleNodeMouseDown(e, node.id)}
              onClick={e => handleNodeClick(e, node.id)}
              onDoubleClick={e => {
                e.stopPropagation();
                if (mode !== "normal") return;
                setEditId(node.id); setEditVal(node.label);
              }}
            >
              {/* ハイライト枠 */}
              {(isFrom || isTo) && (
                <rect x={node.x-3} y={node.y-3} width={NW+6} height={NH+6} rx="9"
                  fill="none" stroke={isFrom ? "#c9920a" : "#afd0ff"} strokeWidth="2"
                  strokeDasharray={isTo ? "5,3" : "none"}/>
              )}
              <rect x={node.x} y={node.y} width={NW} height={NH} rx="6"
                fill={isFrom ? "#c9920a" : "#4a90d9"}
                fillOpacity={isFrom ? 0.4 : isHint ? 0.22 : 0.15}
                stroke={isFrom ? "#c9920a" : "#7a9cc8"} strokeWidth="1.5"/>
              {editId === node.id ? (
                <foreignObject x={node.x+4} y={node.y+7} width={NW-8} height={NH-14}>
                  <input value={editVal}
                    onChange={e => setEditVal(e.target.value)}
                    onBlur={commitEdit}
                    onKeyDown={e => { if(e.key==="Enter") commitEdit(); e.stopPropagation(); }}
                    autoFocus
                    style={{ width:"100%", background:"rgba(0,0,0,0.75)", border:"none", color:"white", textAlign:"center", fontFamily:"sans-serif", fontSize:11, outline:"none", borderRadius:2, boxSizing:"border-box" }}
                  />
                </foreignObject>
              ) : (
                <text x={node.x+NW/2} y={node.y+NH/2} textAnchor="middle" dominantBaseline="middle"
                  fill="white" fontSize={11} fontWeight="bold" fontFamily="sans-serif"
                  style={{ pointerEvents:"none" }}>
                  {node.label.length > 10 ? node.label.slice(0,9)+"…" : node.label}
                </text>
              )}
              {/* 削除ボタン（通常モードのみ） */}
              {mode === "normal" && (
                <g onClick={e => { e.stopPropagation(); removeNode(node.id); }} style={{ cursor:"pointer" }}>
                  <rect x={node.x+NW-14} y={node.y} width={14} height={14} rx="3" fill="rgba(192,57,43,0.0)"/>
                  <text x={node.x+NW-7} y={node.y+8} textAnchor="middle" dominantBaseline="middle"
                    fill="rgba(255,130,120,0.6)" fontSize={12} fontFamily="monospace"
                    style={{ pointerEvents:"none" }}>×</text>
                </g>
              )}
            </g>
          );
        })}
      </svg>

      {/* 凡例 */}
      <div style={{ display:"flex", gap:14, marginTop:6, flexWrap:"wrap" }}>
        {[
          { c:"#7a9cc8",  l:"ノード（ドラッグ移動 / ダブルクリック名前編集）" },
          { c:"#c9920a",  l:"接続モード: 接続元→接続先の順にクリック" },
          { c:"#ff8888",  l:"右上 × でノード削除　/ エッジクリックで削除" },
        ].map(item => (
          <div key={item.l} style={{ display:"flex", alignItems:"center", gap:5 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:item.c }}/>
            <span style={{ color:"rgba(255,255,255,0.35)", fontSize:9, fontFamily:"monospace" }}>{item.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TopBar({ badge }) {
  return (
    <div style={{ background: "#0d0d14", padding: "0 32px", height: 54, display: "flex", alignItems: "center", gap: 16, borderBottom: "3px solid #c9920a" }}>

    </div>
  );
}

    const voices = valid.map(m =>

      ? "\n現状プロセス: " + flowNodes.map(n => n.label).join(", ") + " / 接続: " + flowEdges.map(e => { const f=flowNodes.find(n=>n.id===e.from); const t=flowNodes.find(n=>n.id===e.to); return f&&t?f.label+"→"+t.label:""; }).filter(Boolean).join(", ")
      : "";
    const ctx = "テーマ: "+theme+"\n役員決裁ゴール: "+goal+(bg?"\n背景: "+bg:"")+processText;

    try {
      setAg(1,"active"); setProg(8);
      const insights = await callClaude(AGENTS[0].sys, ctx+"\n\n参加者の意見:\n"+voices, AGENTS[0].tokens);
      setAg(1,"done",insights); setProg(22);

      setAg(2,"active"); setProg(28);
      const tensions = await callClaude(AGENTS[1].sys, ctx+"\n\n本質的問題意識:\n"+insights+"\n\n元の意見:\n"+voices, AGENTS[1].tokens);
      setAg(2,"done",tensions); setProg(45);

      setAg(3,"active"); setProg(50);
      const strategy = await callClaude(AGENTS[2].sys, ctx+"\n\n止揚分析:\n"+tensions+"\n\n元の意見:\n"+voices, AGENTS[2].tokens);
      setAg(3,"done",strategy); setProg(65);

      setAg(4,"active"); setProg(70);
      const slides = await callClaude(AGENTS[3].sys, ctx+"\n\n統合戦略:\n"+strategy, AGENTS[3].tokens);
      setAg(4,"done",slides); setProg(85);

      const review = await callClaude(AGENTS[4].sys, ctx+"\n\n提案内容:\n"+strategy, AGENTS[4].tokens);

                </div>
              ))}
            </div>
            <div style={{fontSize:9, fontFamily:"monospace", letterSpacing:"0.3em", color:"rgba(255,255,255,0.4)", marginBottom:5}}>背景・現状の概要</div>
            <textarea value={bg} onChange={e=>setBg(e.target.value)} rows={2}
              style={{width:"100%", background:"rgba(255,255,255,0.09)", border:"1px solid rgba(255,255,255,0.2)", color:"white", padding:"8px 11px", fontSize:13, borderRadius:2, outline:"none", resize:"vertical", fontFamily:"inherit", boxSizing:"border-box"}} />
            <div style={{fontSize:9, fontFamily:"monospace", letterSpacing:"0.3em", color:"rgba(255,255,255,0.4)", marginTop:18, marginBottom:8}}>現状のプロセス</div>
            <FlowEditor nodes={flowNodes} edges={flowEdges} onNodesChange={setFlowNodes} onEdgesChange={setFlowEdges} />
          </div>

          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16}}>

          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(320px, 1fr))", gap:14, marginBottom:14}}>
            {members.map((m, idx) => (
              <MemberCard key={m.id} m={m} idx={idx} allImages={allImages}
                onUpdate={(f,v) => updateMember(m.id,f,v)}
                onRemove={() => setMembers(ms => ms.filter(x => x.id !== m.id))} />
            ))}
          </div>

          <button onClick={() => { const id=seq.current++; setMembers(ms=>[...ms,{id,name:"",role:"",problem:"",ideal:"",measure:""}]); }}
            style={{width:"100%", border:"2px dashed #ccc", background:"transparent", color:"#aaa", padding:13, fontFamily:"monospace", fontSize:12, cursor:"pointer", borderRadius:2, marginBottom:28}}>
            ＋ メンバーを追加
          </button>

          <div style={{textAlign:"center"}}>
            <button onClick={run}
              style={{background:"#c0392b", color:"white", border:"none", padding:"15px 52px", cursor:"pointer", fontFamily:"monospace", fontSize:13, letterSpacing:"0.2em", borderRadius:2}}>
              AIエージェント起動 → 提案を生成

            {err && <div style={{background:"#fff0ee", border:"1px solid #c0392b", color:"#c0392b", padding:"9px 16px", fontFamily:"monospace", fontSize:11, borderRadius:2, marginTop:10, display:"inline-block"}}>{err}</div>}
          </div>
        </div>
      </div>
    );
  }

  // ── PROCESSING ──
  if (phase === "processing") {
    return (
      <div style={{background:BG, minHeight:"100vh"}}>
        <TopBar />
        <div style={{maxWidth:860, margin:"0 auto", padding:"44px 24px"}}>
          <div style={{textAlign:"center", marginBottom:32}}>
            <div style={{fontSize:28, fontWeight:900, marginBottom:6}}>AIエージェントが思考中</div>
            <div style={{fontFamily:"monospace", fontSize:11, color:"#aaa", letterSpacing:"0.2em"}}>複数エージェントが連携して提案を構築しています</div>
          </div>
          <div style={{height:4, background:"#e0dbd0", borderRadius:2, marginBottom:32, overflow:"hidden"}}>
            <div style={{height:"100%", background:"#c0392b", width:prog+"%"}} />
          </div>
          <div style={{position:"relative"}}>
            <div style={{position:"absolute", left:21, top:22, bottom:22, width:2, background:"#e5e0d8"}} />

              <AgentRow key={ag.id} ag={ag} status={(agSt[ag.id]||{}).status} text={(agSt[ag.id]||{}).text} />

          </div>
        </div>
      </div>

  // ── RESULT ──
  if (phase === "result" && result) {
    const slideList = parseSlides(result.slides);
    const fullText = "【統合提案書】"+result.theme+"\n\n"+"=".repeat(36)+"\n\n■ 統合戦略\n\n"+result.strategy+"\n\n"+"=".repeat(36)+"\n\n■ スライド構成\n\n"+result.slides+"\n\n"+"=".repeat(36)+"\n\n■ 役員レビュー\n\n"+result.review;

        <div style={{maxWidth:1000, margin:"0 auto", padding:"28px 24px"}}>

          <div style={{background:"#0d0d14", color:"white", padding:"36px 36px 28px", borderRadius:"4px 4px 0 0"}}>
            <div style={{fontFamily:"monospace", fontSize:9, letterSpacing:"0.5em", color:"#c9920a", marginBottom:10}}>✦ SYNTHESIZED PROPOSAL — COMPLETE</div>
            <div style={{fontSize:26, fontWeight:900, marginBottom:14, lineHeight:1.2}}>{result.theme}</div>
            <div style={{display:"flex", flexWrap:"wrap", gap:7}}>
              {result.valid.map((m,i) => (

              ))}
            </div>
          </div>

          <div style={{display:"flex", borderBottom:"2px solid #0d0d14", background:"white", borderLeft:"2px solid #0d0d14", borderRight:"2px solid #0d0d14"}}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}

            {imgs.length > 0 && (

          {activeTab === "input" && (
            <div style={{background:"white", border:"2px solid #0d0d14", borderTop:"none", padding:"28px 36px"}}>
              <div style={{background:"#1a2f5a", color:"white", padding:"20px 24px", borderRadius:4, marginBottom:24}}>
                <div style={{fontSize:11, fontFamily:"monospace", letterSpacing:"0.4em", color:"rgba(255,255,255,0.4)", marginBottom:6}}>CONTEXT</div>
                <div style={{fontSize:16, fontWeight:900, borderBottom:"1px solid rgba(255,255,255,0.15)", paddingBottom:10, marginBottom:16}}>提案の背景・目的</div>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:12}}>
                  {[{label:"テーマ / プロジェクト名", val:theme, set:setTheme, ph:"例：営業DX推進"},{label:"役員への決裁ゴール", val:goal, set:setGoal, ph:"例：予算承認・TF設置"}].map(f => (
                    <div key={f.label}>
                      <div style={{fontSize:9, fontFamily:"monospace", letterSpacing:"0.3em", color:"rgba(255,255,255,0.4)", marginBottom:4}}>{f.label}</div>
                      <input value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph}
                        style={{width:"100%", background:"rgba(255,255,255,0.09)", border:"1px solid rgba(255,255,255,0.2)", color:"white", padding:"7px 10px", fontSize:13, borderRadius:2, outline:"none", fontFamily:"inherit", boxSizing:"border-box"}} />
                    </div>
                  ))}
                </div>
                <div style={{fontSize:9, fontFamily:"monospace", letterSpacing:"0.3em", color:"rgba(255,255,255,0.4)", marginBottom:4}}>背景・現状の概要</div>
                <textarea value={bg} onChange={e=>setBg(e.target.value)} rows={2}
                  style={{width:"100%", background:"rgba(255,255,255,0.09)", border:"1px solid rgba(255,255,255,0.2)", color:"white", padding:"7px 10px", fontSize:13, borderRadius:2, outline:"none", resize:"vertical", fontFamily:"inherit", boxSizing:"border-box"}} />
                <div style={{fontSize:9, fontFamily:"monospace", letterSpacing:"0.3em", color:"rgba(255,255,255,0.4)", marginTop:16, marginBottom:8}}>現状のプロセス</div>
                <FlowEditor nodes={flowNodes} edges={flowEdges} onNodesChange={setFlowNodes} onEdgesChange={setFlowEdges} />
              </div>
              <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14}}>
                <div style={{fontSize:16, fontWeight:900}}>メンバーの視点</div>
                <span style={{fontFamily:"monospace", fontSize:11, color:"#888", background:"rgba(0,0,0,0.06)", padding:"3px 12px", borderRadius:20}}>{members.length} 名</span>
              </div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(320px, 1fr))", gap:14, marginBottom:14}}>
                {members.map((m, idx) => (
                  <MemberCard key={m.id} m={m} idx={idx} allImages={allImages}
                    onUpdate={(f,v) => updateMember(m.id,f,v)}
                    onRemove={() => setMembers(ms => ms.filter(x => x.id !== m.id))} />
                ))}
              </div>
              <button onClick={() => { const id=seq.current++; setMembers(ms=>[...ms,{id,name:"",role:"",problem:"",ideal:"",measure:""}]); }}
                style={{width:"100%", border:"2px dashed #ccc", background:"transparent", color:"#aaa", padding:12, fontFamily:"monospace", fontSize:12, cursor:"pointer", borderRadius:2, marginBottom:24}}>
                ＋ メンバーを追加
              </button>
              <div style={{textAlign:"center"}}>
                <button onClick={run}
                  style={{background:"#c0392b", color:"white", border:"none", padding:"14px 48px", cursor:"pointer", fontFamily:"monospace", fontSize:13, letterSpacing:"0.2em", borderRadius:2}}>
                  AIエージェント再起動 → 提案を再生成
                </button>
                <div style={{marginTop:8, fontSize:10, color:"#aaa", fontFamily:"monospace"}}>内容を変更して再生成できます</div>
              </div>
            </div>
          )}

          {activeTab === "proposal" && (
            <div style={{background:"white", border:"2px solid #0d0d14", borderTop:"none", padding:"28px 36px"}}>
              {[
                {label:"◉ 統合戦略（Agent 3）",              color:"#c0392b", text:result.strategy},
                {label:"◉ 本質的な問題意識の抽出（Agent 1）", color:"#1a2f5a", text:result.insights},
                {label:"◉ 視点の止揚分析（Agent 2）",         color:"#2d5a27", text:result.tensions},
                {label:"◉ 役員視点レビュー（Agent 5）",        color:"#1a5c3a", text:result.review},
              ].map(s => (
                <div key={s.label} style={{marginTop:24}}>
                  <div style={{fontFamily:"monospace", fontSize:9, letterSpacing:"0.4em", textTransform:"uppercase", color:s.color, marginBottom:7}}>{s.label}</div>
                  <div style={{fontSize:14, lineHeight:1.9, whiteSpace:"pre-wrap", color:"#1f2937"}}>{s.text}</div>
                </div>
              ))}
              {/* プロセス改革図 */}
              <div style={{marginTop:32}}>
                <div style={{fontSize:16, fontWeight:900, marginBottom:4}}>プロセス改革図</div>
                <div style={{fontSize:11, color:"#888", marginBottom:16}}>現状のプロセスと、提案に基づく目指すプロセスを対比します</div>
                {/* AS-IS */}
                <div style={{marginBottom:20}}>
                  <div style={{fontFamily:"monospace", fontSize:9, letterSpacing:"0.35em", color:"#1a2f5a", marginBottom:6}}>AS-IS — 現状のプロセス</div>
                  <div id="pdf-asis"><ProcessFlowSVG nodes={flowNodes.map(n=>({...n,status:"unchanged"}))} edges={flowEdges} mode="asis"/></div>
                </div>
                {/* 矢印 */}
                <div style={{textAlign:"center", margin:"4px 0 12px", color:"#ccc", fontSize:20, lineHeight:1}}>↓</div>
                {/* TO-BE */}
                <div>
                  <div style={{fontFamily:"monospace", fontSize:9, letterSpacing:"0.35em", color:"#1a5c3a", marginBottom:6}}>TO-BE — 目指すプロセス</div>
                  {toBeData ? (
                    <div>
                      {toBeData.summary && <div style={{fontSize:11, color:"#1a5c3a", marginBottom:8, fontWeight:700}}>{toBeData.summary}</div>}
                      <div id="pdf-tobe"><ProcessFlowSVG nodes={toBeData.nodes||[]} edges={toBeData.edges||[]} mode="tobe"/></div>
                      <div style={{display:"flex", gap:12, marginTop:6, flexWrap:"wrap"}}>
                        {[{c:"#3a5a8a",l:"変更なし"},{c:"#c9920a",l:"変更あり（改）"},{c:"#1a5c3a",l:"新規追加（NEW）"}].map(item=>(
                          <div key={item.l} style={{display:"flex",alignItems:"center",gap:4}}>
                            <div style={{width:10,height:10,borderRadius:2,background:item.c,opacity:0.6}}/>
                            <span style={{fontSize:10,color:"#666"}}>{item.l}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ) : (
                    <div style={{padding:"20px",textAlign:"center",border:"1px dashed #ddd",borderRadius:4}}>
                      {svgLoading ? (
                        <div style={{color:"#c9920a",fontFamily:"monospace",fontSize:11}}>⏳ To-Beプロセスを生成中...</div>
                      ) : (
                        <div>
                          <div style={{color:"#bbb",fontSize:11,marginBottom:10}}>まだ生成されていません</div>
                          <button onClick={generateSVG}
                            style={{padding:"6px 18px",background:"#1a5c3a",border:"none",color:"white",fontFamily:"monospace",fontSize:10,cursor:"pointer",borderRadius:2}}>
                            ↺ To-Beプロセスを生成する
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>

              <div style={{marginTop:28}}>
                <div style={{fontSize:16, fontWeight:900, marginBottom:12}}>スライド構成プレビュー</div>
                <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))", gap:10}}>
                  {slideList.map((sl,i) => (
                    <div key={i} style={{background:"#faf8f4", border:"1px solid #e5e0d8", borderRadius:4, overflow:"hidden"}}>
                      <div style={{height:5, background:COLORS[i%COLORS.length]}} />
                      <div style={{padding:"11px 13px"}}>
                        <div style={{fontFamily:"monospace", fontSize:8, color:"#bbb", marginBottom:3}}>SLIDE {sl.num}</div>
                        <div style={{fontSize:13, fontWeight:700, lineHeight:1.3}}>{sl.title}</div>
                        {sl.sub && <div style={{fontSize:11, color:"#888", marginTop:3}}>{sl.sub}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              {imgs.length > 0 && (
                <div style={{marginTop:24}}>
                  <div style={{fontSize:14, fontWeight:900, marginBottom:10}}>資料から抽出した画像 ({imgs.length}枚)</div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
                    {imgs.map((img,i) => (
                      <div key={i} style={{position:"relative"}}>
                        <img src={img.url} alt={img.name} style={{width:120, height:80, objectFit:"cover", borderRadius:4, border:"1px solid #e5e0d8"}} />
                        <div style={{position:"absolute", bottom:2, left:2, right:2, background:"rgba(0,0,0,0.5)", color:"white", fontSize:8, padding:"1px 4px", borderRadius:2, textOverflow:"ellipsis", overflow:"hidden", whiteSpace:"nowrap"}}>{img.name}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {activeTab === "diagram" && (
            <div style={{background:"white", border:"2px solid #0d0d14", borderTop:"none", padding:"28px 36px"}}>
              {/* シーケンシャル進捗バー */}
              {svgLoading && (
                <div style={{marginBottom:28}}>
                  <div style={{fontFamily:"monospace", fontSize:11, color:"#888", marginBottom:10}}>図解を自動生成中...</div>
                  <div style={{display:"flex", gap:6}}>
                    {[
                      {step:1,label:"戦略マップ"},
                      {step:2,label:"問題ツリー"},
                      {step:3,label:"因果連鎖"},
                      {step:4,label:"To-Beプロセス"},
                    ].map(s=>(
                      <div key={s.step} style={{flex:1, textAlign:"center"}}>
                        <div style={{height:4, borderRadius:2, marginBottom:4,
                          background: svgGenStep>=s.step ? "#1a2f5a" : svgGenStep===s.step-1 ? "#c9920a" : "#e5e0d8",
                          transition:"background 0.3s"}}/>
                        <div style={{fontSize:9, fontFamily:"monospace",
                          color: svgGenStep>=s.step ? "#1a2f5a" : svgGenStep===s.step-1 ? "#c9920a" : "#bbb"}}>
                          {svgGenStep>=s.step?"✓ ":svgGenStep===s.step-1?"⏳ ":""}{s.label}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* 生成済み図解 */}
              {(svgData || causalData || toBeData) && (
                <div>
                  {[
                    {id:"svg-problem-tree", show:!!svgData, title:"① 問題・課題ツリー図", subtitle:"根本問題→原因→本質的課題の階層構造", comp:svgData?<ProblemTreeSVG data={svgData.problemTree}/>:null, file:"problem-tree.svg"},
                    {id:"svg-strategy",     show:!!svgData, title:"② 戦略マップ",        subtitle:"提案の核心と3本柱の構造",        comp:svgData?<StrategyMapSVG data={svgData.strategyMap}/>:null, file:"strategy-map.svg"},
                    {id:"svg-roadmap",      show:!!svgData, title:"③ ロードマップ",      subtitle:"3フェーズの実行計画タイムライン", comp:svgData?<RoadmapSVG data={svgData.roadmap}/>:null, file:"roadmap.svg"},
                    {id:"svg-stakeholder",  show:!!svgData, title:"④ ステークホルダーマップ", subtitle:"参加者の問題意識グルーピング", comp:svgData?<StakeholderSVG data={svgData.stakeholderMap} members={result.valid}/>:null, file:"stakeholder-map.svg"},
                    {id:"svg-causal",       show:!!causalData, title:"⑤ 因果連鎖グラフ", subtitle:"施策→効果→課題解決の波及構造（DAG）", comp:causalData?<CausalChainSVG data={causalData}/>:null, file:"causal-dag.svg"},
                  ].filter(d=>d.show).map(d=>(
                    <div key={d.id} style={{marginBottom:36}}>
                      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
                        <div>
                          <div style={{fontSize:15, fontWeight:900}}>{d.title}</div>
                          <div style={{fontSize:11, color:"#888"}}>{d.subtitle}</div>
                        </div>
                        <button onClick={()=>downloadSVG(d.id,d.file)}
                          style={{padding:"7px 16px", fontFamily:"monospace", fontSize:10, cursor:"pointer", borderRadius:2, background:"#1a2f5a", border:"none", color:"white", letterSpacing:"0.1em"}}>
                          ⬇ SVGをDL
                        </button>
                      </div>
                      <div id={d.id} style={{border:"1px solid #e5e0d8", borderRadius:4, overflow:"hidden"}}>{d.comp}</div>
                    </div>
                  ))}
                  {!svgLoading && (
                    <button onClick={generateSVG}
                      style={{padding:"8px 18px", fontFamily:"monospace", fontSize:10, cursor:"pointer", borderRadius:2, background:"transparent", border:"1px solid #ccc", color:"#888"}}>
                      ↺ 再生成
                    </button>
                  )}
                </div>
              )}
              {!svgData && !causalData && !svgLoading && (
                <div style={{textAlign:"center", padding:"40px 0"}}>
                  <div style={{fontSize:40, marginBottom:12}}>🗺</div>
                  <div style={{fontSize:16, fontWeight:900, marginBottom:8}}>図解データを生成中です</div>
                  <div style={{fontSize:13, color:"#888"}}>提案生成後に自動で図解されます。完了までしばらくお待ちください。</div>
                </div>
              )}
            </div>
          )}

          <div style={{display:"flex", gap:12, marginTop:20, flexWrap:"wrap"}}>
            <button onClick={() => copyText(fullText)}
              style={{padding:"12px 28px", fontFamily:"monospace", fontSize:11, letterSpacing:"0.15em", cursor:"pointer", borderRadius:2, background:copied?"#1a5c3a":"#c9920a", border:"none", color:"white", fontWeight:700}}>
              {copied ? "✓ コピーしました" : "📋 全文をコピー"}
            </button>
            <button onClick={exportPDF}
              style={{padding:"12px 28px", fontFamily:"monospace", fontSize:11, letterSpacing:"0.15em", cursor:"pointer", borderRadius:2, background:"#1a2f5a", border:"none", color:"white", fontWeight:700}}>
              📄 HTMLで出力（印刷→PDF）
            </button>
            <button onClick={reset}
              style={{padding:"12px 28px", fontFamily:"monospace", fontSize:11, letterSpacing:"0.15em", cursor:"pointer", borderRadius:2, background:"transparent", border:"2px solid #0d0d14", color:"#0d0d14"}}>
              ← やり直す
            </button>
          </div>
          {err && <div style={{background:"#fff0ee", border:"1px solid #c0392b", color:"#c0392b", padding:"9px 16px", fontFamily:"monospace", fontSize:11, borderRadius:2, marginTop:10}}>{err}</div>}
        </div>
      </div>
    );
  }

  return null;
}



function ApiKeyScreen({ onStart }) {
  const [key, setKey] = React.useState("");
  const [err, setErr] = React.useState("");
  const [testing, setTesting] = React.useState(false);

  const stored = sessionStorage.getItem("synthesis_api_key");
  React.useEffect(() => {
    if (stored) { window.__SYNTHESIS_KEY__ = stored; onStart(); }
  }, []);

  const handleStart = async () => {
    const k = key.trim();
    if (!k.startsWith("sk-ant-")) { setErr("APIキーは sk-ant- で始まる形式です"); return; }
    setTesting(true); setErr("");
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:10,messages:[{role:"user",content:"hi"}]})
      });
      if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||"認証失敗"); }
      window.__SYNTHESIS_KEY__ = k;
      sessionStorage.setItem("synthesis_api_key", k);
      onStart();
    } catch(e) { setErr("エラー: " + e.message); }
    setTesting(false);
  };

  if (stored) return null;

  return (
    <div style={{minHeight:"100vh",background:"#0d0d14",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace"}}>
      <div style={{width:480,padding:"48px 40px",background:"#13131f",border:"1px solid #2a2a3a",borderRadius:8}}>
        <div style={{color:"#c9920a",fontSize:11,letterSpacing:"0.5em",marginBottom:8}}>SYNTHESIS</div>
        <div style={{color:"white",fontSize:22,fontWeight:900,marginBottom:6,lineHeight:1.2}}>AI統合提案エンジン</div>
        <div style={{color:"#666",fontSize:11,marginBottom:32,lineHeight:1.6}}>
          Anthropic APIキーを入力してください。<br/>
          キーはこのブラウザセッション中のみ保持されます。
        </div>
        <div style={{marginBottom:16}}>
          <div style={{color:"#888",fontSize:10,letterSpacing:"0.2em",marginBottom:6}}>API KEY</div>
          <input
            type="password"
            value={key}
            onChange={e=>setKey(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleStart()}
            placeholder="sk-ant-api03-..."
            style={{width:"100%",padding:"12px 14px",background:"#1a1a2a",border:"1px solid #333",borderRadius:4,color:"white",fontFamily:"monospace",fontSize:13,outline:"none"}}
          />
        </div>
        {err && <div style={{color:"#c0392b",fontSize:11,marginBottom:12,padding:"8px 10px",background:"rgba(192,57,43,0.1)",borderRadius:3}}>{err}</div>}
        <button onClick={handleStart} disabled={testing||!key.trim()}
          style={{width:"100%",padding:"13px",background:testing?"#333":"#c9920a",border:"none",color:testing?"#888":"#0d0d14",fontFamily:"monospace",fontWeight:900,fontSize:12,letterSpacing:"0.3em",cursor:testing?"wait":"pointer",borderRadius:4,transition:"background 0.2s"}}>
          {testing ? "⏳ 確認中..." : "START →"}
        </button>
        <div style={{marginTop:24,padding:"14px",background:"rgba(201,146,10,0.06)",border:"1px solid rgba(201,146,10,0.2)",borderRadius:4}}>
          <div style={{color:"#c9920a",fontSize:9,letterSpacing:"0.2em",marginBottom:6}}>APIキーの取得方法</div>
          <div style={{color:"#666",fontSize:10,lineHeight:1.7}}>
            1. <a href="https://console.anthropic.com" target="_blank" style={{color:"#c9920a"}}>console.anthropic.com</a> にアクセス<br/>
            2. 「API Keys」→「Create Key」<br/>
            3. 生成されたキーをコピーして上に貼り付け
          </div>
        </div>
        <div style={{marginTop:16,color:"#444",fontSize:9,textAlign:"center",lineHeight:1.6}}>
          キーはサーバーに送信されません。ブラウザのsessionStorageのみに保存。<br/>
          タブを閉じると自動削除されます。
        </div>
      </div>
    </div>
  );
}

function Root() {
  const [started, setStarted] = React.useState(false);
  return started ? React.createElement(App) : React.createElement(ApiKeyScreen, {onStart:()=>setStarted(true)});
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(Root));
</script>
</body>
</html>
